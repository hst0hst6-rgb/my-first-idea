<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>응원의 한마디</title>
    <link rel="stylesheet" href="index.css?v=5">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <div class="logo">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="header-icon"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
            <h1>나의 첫 서비스</h1>
        </div>
        <nav>
            <ul>
                <li><a href="#features">기능 소개</a></li>
                <li><a href="#reviews">사용자 후기</a></li>
                <li><a href="#contact">문의</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <!-- 핵심 기능 소개 섹션 -->
        <section class="section" id="features">
            <h2 class="section-title">핵심 기능 소개</h2>
            <div class="container">
                <span class="sub-text">Positive Vibes</span>
                <h1 class="idea-text">오늘도 힘내세요</h1>
                <button class="action-button" id="action-button">다음 문장 보기</button>
            </div>
        </section>

        <!-- 사용자 후기 섹션 -->
        <section class="section" id="reviews">
            <h2 class="section-title">사용자 후기</h2>
            <div class="reviews-container">
                <!-- 후기 1 -->
                <div class="review-card">
                    <p class="review-content">"이 서비스를 사용하고 나서 매일 아침이 즐거워졌어요. 작은 응원 한마디가 정말 큰 힘이 됩니다!"</p>
                    <div class="review-user">
                        <img src="user_profile_1.png" alt="사용자 1">
                        <div class="user-info">
                            <span class="user-name">김지수</span>
                            <span class="user-role">프리랜서 디자이너</span>
                        </div>
                    </div>
                </div>

                <!-- 후기 2 -->
                <div class="review-card">
                    <p class="review-content">"심플하지만 강력한 긍정의 힘을 느낍니다. UI가 너무 예뻐서 자꾸 들어오게 되네요."</p>
                    <div class="review-user">
                        <img src="user_profile_2.png" alt="사용자 2">
                        <div class="user-info">
                            <span class="user-name">이민호</span>
                            <span class="user-role">IT 개발자</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        &copy; 2025 My Service
    </footer>
    <script>
        const sentences = [
            '오늘도 힘내세요',
            '오늘도 해냈어요!',
            '조금씩 나아지고 있어요',
            '이대로 계속 가봅시다.'
        ];
        let currentIndex = 0;

        const ideaText = document.querySelector('.idea-text');
        const actionButton = document.querySelector('.action-button');

        actionButton.addEventListener('click', function () {
            currentIndex = (currentIndex + 1) % sentences.length;

            // Remove existing color classes
            this.classList.remove('yellow', 'orange', 'green');

            // Add new color class based on index
            if (currentIndex === 1) this.classList.add('yellow');
            else if (currentIndex === 2) this.classList.add('orange');
            else if (currentIndex === 3) this.classList.add('green');

            // Add a small fade effect for text
            ideaText.style.opacity = '0';

            setTimeout(() => {
                ideaText.textContent = sentences[currentIndex];
                ideaText.style.opacity = '1';
            }, 200);
        });

        // Initialize with smooth transition support
        ideaText.style.transition = 'opacity 0.2s ease';
    </script>
</body>

</html>
